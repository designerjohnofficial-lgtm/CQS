<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CQS Training</title>
    <script>
      // Workaround for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when certain polyfills try to overwrite fetch in a read-only environment.
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function() { 
                console.warn('Blocked attempt to override window.fetch');
              }
            });
          }
        } catch (e) {
          // If we can't redefine it, it might already be restricted but at least we tried
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
